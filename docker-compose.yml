version: '3.8'

services:
  backend:
    build: ./backend
    container_name: email-triage-backend
    restart: unless-stopped
    volumes:
      - ./backend/model:/app/model:ro
    expose:
      - "5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: email-triage-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend